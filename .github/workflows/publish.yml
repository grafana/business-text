name: Plugins - CD
run-name: Deploy ${{ inputs.branch }} to ${{ inputs.environment }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to publish from. Can be used to deploy PRs to dev
        default: main
      environment:
        description: Environment to publish to
        required: true
        type: choice
        options:
          - "dev"
          - "ops"
          - "prod"
      docs-only:
        description: Only publish docs, do not publish the plugin
        default: false
        type: boolean

permissions: {}

jobs:
  check-changelog:
    name: Check changelog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Verify CHANGELOG.md files have no [Unreleased] section
        run: |
          check_changelog() {
            local file="$1"
            UNRELEASED_LINE=$(grep -n "^## \[Unreleased\]" "$file" | head -1 | cut -d: -f1)
            RELEASE_LINE=$(grep -n "^## \[[0-9]" "$file" | head -1 | cut -d: -f1)

            # No [Unreleased] section — nothing to check
            if [ -z "$UNRELEASED_LINE" ]; then
              return 0
            fi

            # [Unreleased] is below the latest release — fine
            if [ -n "$RELEASE_LINE" ] && [ "$UNRELEASED_LINE" -gt "$RELEASE_LINE" ]; then
              return 0
            fi

            VERSION=$(jq -r '.version' package.json)
            echo "Error: $file contains an [Unreleased] section."
            echo "A released version is required and must match package.json (${VERSION})."
            return 1
          }

          check_changelog CHANGELOG.md || exit 1
          if [ -f src/CHANGELOG.md ]; then
            check_changelog src/CHANGELOG.md || exit 1
          fi

  cd:
    name: CD
    needs: check-changelog
    uses: grafana/plugin-ci-workflows/.github/workflows/cd.yml@ci-cd-workflows/v10.1.0
    permissions:
      attestations: write
      contents: write
      id-token: write
      pull-requests: read
    with:
      branch: ${{ github.event.inputs.branch }}
      environment: ${{ github.event.inputs.environment }}
      docs-only: ${{ fromJSON(github.event.inputs.docs-only) }}
      signature-type: community
      run-playwright: false
