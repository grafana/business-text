name: Coverage Report

on:
  pull_request:

permissions: {}

jobs:
  coverage:
    name: Jest Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage (PR)
        run: npx jest --ci --coverage --coverageReporters=json-summary --coverageReporters=json --maxWorkers=4

      - name: Save PR coverage
        run: |
          mkdir -p /tmp/pr-coverage
          cp coverage/coverage-summary.json /tmp/pr-coverage/coverage-summary.json

      - name: Checkout base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          clean: false

      - name: Install dependencies (base)
        run: npm ci

      - name: Run tests with coverage (base)
        run: npx jest --ci --coverage --coverageReporters=json-summary --coverageReporters=json --maxWorkers=4

      - name: Save base coverage
        run: |
          mkdir -p /tmp/base-coverage
          cp coverage/coverage-summary.json /tmp/base-coverage/coverage-summary.json

      - name: Restore PR coverage
        run: |
          cp /tmp/pr-coverage/coverage-summary.json coverage/coverage-summary.json

      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@d63aa97db4c0319f304f1787689de1ca548365cf # v2
        with:
          json-summary-compare-path: /tmp/base-coverage/coverage-summary.json
          file-coverage-mode: all

  coverage-detail:
    name: Jest Coverage Detail
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Coverage report
        uses: ArtiomTr/jest-coverage-report-action@7f750dd50f5585533321eb7ebc482b936b49a5d4 # v2
        with:
          test-script: npx jest --ci --coverage --maxWorkers=4
          annotations: none
