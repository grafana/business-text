name: Coverage Report

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Jest Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage (PR)
        run: npx jest --ci --coverage --coverageReporters=json-summary --maxWorkers=4
        continue-on-error: true

      - name: Save PR coverage
        run: cp coverage/coverage-summary.json /tmp/pr-coverage.json

      - name: Checkout base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          clean: false

      - name: Install dependencies (base)
        run: npm ci

      - name: Run tests with coverage (base)
        run: npx jest --ci --coverage --coverageReporters=json-summary --maxWorkers=4
        continue-on-error: true

      - name: Save base coverage
        run: cp coverage/coverage-summary.json /tmp/base-coverage.json

      - name: Compare coverage and comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');

            const pr = JSON.parse(fs.readFileSync('/tmp/pr-coverage.json', 'utf8'));
            const base = JSON.parse(fs.readFileSync('/tmp/base-coverage.json', 'utf8'));

            const metrics = ['statements', 'branches', 'functions', 'lines'];
            const rows = metrics.map((m) => {
              const basePct = base.total[m].pct;
              const prPct = pr.total[m].pct;
              const diff = (prPct - basePct).toFixed(2);
              const icon = diff > 0 ? '+' : diff < 0 ? '' : '';
              return `| ${m} | ${basePct}% | ${prPct}% | ${icon}${diff}% |`;
            });

            const body = [
              '## Coverage Report',
              '',
              '| Metric | Base | PR | Diff |',
              '| --- | --- | --- | --- |',
              ...rows,
              '',
            ].join('\n');

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Coverage Report';
            const existing = comments.find((c) => c.body?.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            // Fail if any metric decreased
            const decreased = metrics.filter(
              (m) => pr.total[m].pct < base.total[m].pct
            );
            if (decreased.length > 0) {
              core.setFailed(
                `Coverage decreased for: ${decreased.join(', ')}`
              );
            }
